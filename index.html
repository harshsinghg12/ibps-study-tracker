
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBPS PO Tracker V2</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f5f7fb;
padding:25px;
color:#334155;
}

h1{
text-align:center;
margin-bottom:25px;
}

.section{
margin-bottom:50px;
}

.section-title{
margin-bottom:15px;
font-size:28px;
color:#4338ca;
}

.stats{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
}

.card{
background:white;
padding:18px;
border-radius:18px;
min-width:150px;
text-align:center;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.card h2{
color:#4f46e5;
}

.progress-box{
margin-bottom:20px;
}

.progress{
height:12px;
background:#e2e8f0;
border-radius:20px;
overflow:hidden;
}

.progress-fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#6366f1,#8b5cf6);
transition:.3s;
}

.progress-text{
margin-bottom:8px;
font-weight:600;
}

.table-container{
background:white;
padding:20px;
border-radius:20px;
overflow:auto;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

table{
width:100%;
border-collapse:separate;
border-spacing:0 8px;
min-width:1200px;
}

th{
background:#eef2ff;
padding:12px;
color:#4338ca;
}

td{
background:#f8fafc;
padding:12px;
text-align:center;
}

td:first-child,
td:nth-child(2){
text-align:left;
font-weight:500;
}

.status-btn{
width:42px;
height:42px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:18px;
color:white;
}

.reset-btn{
padding:10px 20px;
background:#ef4444;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
margin-bottom:20px;
}
</style>
</head>

<body>

<h1>📚 IBPS PO STUDY TRACKER V2</h1>

<button class="reset-btn" onclick="resetAll()">Reset All</button>

<div id="tracker"></div>

<script>

const tasks=[
["5:30 AM - 7:00 AM","🏃 Running"],
["8:30 AM - 11:00 AM","🧠 Reasoning + Revision"],
["11:00 AM - 1:30 PM","📖 Editorial + English"],
["2:00 PM - 5:00 PM","📊 Quant Checklist + DI"],
["5:00 PM - 8:00 PM","🔁 Quant Revision"],
["9:00 PM - 11:00 PM","🎯 Mock IBPS PO"],
["11:00 PM - 12:00 AM","📚 English Revision"]
];

const sections=[
{
id:"june",
title:"📅 June 21 - 30",
dates:["21 Jun","22 Jun","23 Jun","24 Jun","25 Jun","26 Jun","27 Jun","28 Jun","29 Jun","30 Jun"]
},
{
id:"aug1",
title:"📅 August 1 - 10",
dates:["1 Aug","2 Aug","3 Aug","4 Aug","5 Aug","6 Aug","7 Aug","8 Aug","9 Aug","10 Aug"]
},
{
id:"aug2",
title:"📅 August 11 - 20",
dates:["11 Aug","12 Aug","13 Aug","14 Aug","15 Aug","16 Aug","17 Aug","18 Aug","19 Aug","20 Aug"]
},
{
id:"aug3",
title:"📅 August 21 - 31",
dates:["21 Aug","22 Aug","23 Aug","24 Aug","25 Aug","26 Aug","27 Aug","28 Aug","29 Aug","30 Aug","31 Aug"]
}
];

const tracker=document.getElementById("tracker");

sections.forEach((section,sIndex)=>{

const total=section.dates.length*tasks.length;

const wrapper=document.createElement("div");
wrapper.className="section";

wrapper.innerHTML=`
<h2 class="section-title">${section.title}</h2>

<div class="stats">
<div class="card">
<h2 id="${section.id}-completed">0</h2>
<p>Completed</p>
</div>

<div class="card">
<h2 id="${section.id}-missed">0</h2>
<p>Missed</p>
</div>

<div class="card">
<h2 id="${section.id}-remaining">${total}</h2>
<p>Remaining</p>
</div>
</div>

<div class="progress-box">
<div class="progress-text" id="${section.id}-text">
Progress: 0%
</div>

<div class="progress">
<div class="progress-fill" id="${section.id}-fill"></div>
</div>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>⏰ Time Slot</th>
<th>📖 Task</th>
${section.dates.map(d=>`<th>${d}</th>`).join("")}
</tr>
</thead>
<tbody id="${section.id}-body"></tbody>
</table>
</div>
`;

tracker.appendChild(wrapper);

const body=document.getElementById(section.id+"-body");

tasks.forEach((task,row)=>{

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${task[0]}</td>
<td>${task[1]}</td>
`;

section.dates.forEach((date,col)=>{

const td=document.createElement("td");

const key=`tracker-${section.id}-${row}-${col}`;

const btn=document.createElement("button");
btn.className="status-btn";

let state=localStorage.getItem(key)||"none";

function paint(){
if(state==="done"){
btn.innerHTML="✅";
btn.style.background="#22c55e";
}
else if(state==="missed"){
btn.innerHTML="❌";
btn.style.background="#ef4444";
}
else{
btn.innerHTML="⚪";
btn.style.background="#94a3b8";
}
}

paint();

btn.addEventListener("click",()=>{

if(state==="none"){
state="done";
}
else if(state==="done"){
state="missed";
}
else{
state="none";
}

localStorage.setItem(key,state);
paint();
updateSection(section);
});

td.appendChild(btn);
tr.appendChild(td);

});

body.appendChild(tr);
});

updateSection(section);

});

function updateSection(section){

let completed=0;
let missed=0;

Object.keys(localStorage).forEach(key=>{

if(key.startsWith("tracker-"+section.id)){

const value=localStorage.getItem(key);

if(value==="done") completed++;
if(value==="missed") missed++;
}
});

const total=section.dates.length*tasks.length;
const remaining=total-completed-missed;

document.getElementById(section.id+"-completed").innerText=completed;
document.getElementById(section.id+"-missed").innerText=missed;
document.getElementById(section.id+"-remaining").innerText=remaining;

const percent=Math.round((completed/total)*100);

document.getElementById(section.id+"-fill").style.width=percent+"%";

document.getElementById(section.id+"-text").innerText=
`Completed: ${completed} | Missed: ${missed} | Progress: ${percent}%`;
}

function resetAll(){

if(confirm("Reset all progress?")){

Object.keys(localStorage).forEach(key=>{
if(key.startsWith("tracker-")){
localStorage.removeItem(key);
}
});

location.reload();
}
}
</script>

</body>
</html>
